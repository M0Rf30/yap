name: 📡 Publish MCP Server

# Builds the dedicated yap-mcp OCI image and publishes the server to the
# official MCP registry (registry.modelcontextprotocol.io).
#
# Runs on version tags after release artifacts exist. The OCI image is the
# package referenced by server.json (registryType: oci).

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (without v prefix, e.g. 2.2.1)"
        required: true
        type: string

permissions:
  contents: read
  packages: write
  id-token: write # required for MCP registry GitHub OIDC auth

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/m0rf30/yap-mcp

jobs:
  image:
    name: 🐳 Build & push yap-mcp image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: 📂 Checkout
        uses: actions/checkout@v6

      - name: 🏷️ Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            V="${{ github.event.inputs.version }}"
          else
            V="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=${V}" >> "$GITHUB_OUTPUT"

      - name: 🔧 Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: 🔑 Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐳 Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/mcp/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=v${{ steps.ver.outputs.version }}
            COMMIT=${{ github.sha }}
          tags: |
            ${{ env.IMAGE }}:${{ steps.ver.outputs.version }}
            ${{ env.IMAGE }}:latest

  publish:
    name: 📡 Publish to MCP registry
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: image
    steps:
      - name: 📂 Checkout
        uses: actions/checkout@v6

      - name: 🏷️ Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            V="${{ github.event.inputs.version }}"
          else
            V="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=${V}" >> "$GITHUB_OUTPUT"

      - name: 🔄 Inject tag version into server.json
        run: |
          V="${{ steps.ver.outputs.version }}"
          # server.json ships with a 0.0.0 placeholder; the git tag is the
          # single source of truth. OCI packages carry the version as the image
          # tag in `identifier` (no `version` field is allowed), so rewrite the
          # tag suffix and the top-level server version.
          jq --arg v "$V" \
            '.version = $v
             | .packages[].identifier |= (sub(":[^:]*$"; "") + ":" + $v)' \
            server.json > server.json.tmp
          mv server.json.tmp server.json
          cat server.json

      - name: 📥 Install mcp-publisher
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" \
            | tar -xz mcp-publisher
          sudo mv mcp-publisher /usr/local/bin/

      - name: 🔐 Authenticate (GitHub OIDC)
        run: mcp-publisher login github-oidc

      - name: 📡 Publish
        run: mcp-publisher publish

  # Bump the Claude Code plugin manifest version to match the tag and commit it
  # back to the default branch. plugin.json is read from the repo at install
  # time, so unlike server.json it must be persisted (not just injected in CI).
  plugin-version:
    name: 🔖 Sync plugin.json version
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: image
    permissions:
      contents: write
    steps:
      - name: 📂 Checkout default branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: 🏷️ Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            V="${{ github.event.inputs.version }}"
          else
            V="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=${V}" >> "$GITHUB_OUTPUT"

      - name: 🔖 Update & commit plugin.json
        run: |
          V="${{ steps.ver.outputs.version }}"
          jq --arg v "$V" '.version = $v' \
            .claude-plugin/plugin.json > .claude-plugin/plugin.json.tmp
          mv .claude-plugin/plugin.json.tmp .claude-plugin/plugin.json
          if git diff --quiet; then
            echo "plugin.json already at ${V}"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/plugin.json
          git commit -m "chore(plugin): sync plugin.json version to ${V} [skip ci]"
          git push
