---
name: Reusable Security Scan

on:
  workflow_call:
    inputs:
      go-version:
        description: "Go version to use"
        required: false
        type: string
        default: "1.26.4"
      upload-sarif:
        description: "Upload SARIF to GitHub Security"
        required: false
        type: boolean
        default: true
      run-vulncheck:
        description: "Run govulncheck vulnerability scanner"
        required: false
        type: boolean
        default: true

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📂 Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: 🐹 Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ inputs.go-version }}
          cache: true

      - name: 📥 Download dependencies
        run: go mod download

      - name: 🛡️ Install govulncheck
        if: ${{ inputs.run-vulncheck }}
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: 🔍 Run vulnerability check
        if: ${{ inputs.run-vulncheck }}
        id: vulncheck
        run: |
          echo "🔍 Running vulnerability scan..."

          if govulncheck -json ./... > vulncheck.json 2>&1; then
            echo "result=success" >> "$GITHUB_OUTPUT"
            echo "✅ No vulnerabilities found"
          else
            echo "result=vulnerabilities_found" >> "$GITHUB_OUTPUT"
            echo "⚠️ Vulnerabilities detected"
          fi

      - name: 📤 Upload vulnerability scan results
        if: ${{ inputs.run-vulncheck }}
        uses: actions/upload-artifact@v7
        with:
          name: vulnerability-scan-results
          path: vulncheck.json
          retention-days: 30
